    appVersion: 0.10.0
    created: "2026-07-07T16:11:10.387690154Z"
    description: OpenTelemetry eBPF Instrumentation (OBI) for ilert. A zero-code,
      kernel-level DaemonSet that auto-instruments every workload on a node and emits
      OTLP traces used to build the ilert Service Health topology.
