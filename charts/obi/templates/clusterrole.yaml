{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "obi.fullname" . }}
  labels:
    {{- include "obi.labels" . | nindent 4 }}
rules:
  # OBI resolves ReplicaSets to their owning Deployment for workload metadata.
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["list", "watch"]
  # Pods/services/nodes are read to decorate spans with Kubernetes metadata and
  # to name in-cluster peers in the Service Health topology.
  - apiGroups: [""]
    resources: ["pods", "services", "nodes"]
    verbs: ["list", "watch"]
{{- end }}
