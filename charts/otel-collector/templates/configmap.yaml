apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "otel-collector.fullname" . }}
  labels:
    {{- include "otel-collector.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.configOverride }}
    {{- toYaml .Values.configOverride | nindent 4 }}
    {{- else }}
    extensions:
      # Exposes /healthz-style endpoint on :13133 for the k8s liveness/readiness
      # probes.
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      # Accept OTLP from OBI and any app SDK, over both gRPC and HTTP.
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.ports.otlpGrpc }}
          http:
            endpoint: 0.0.0.0:{{ .Values.ports.otlpHttp }}

    processors:
      # Refuse new data before the collector runs out of memory under bursts.
      memory_limiter:
        check_interval: {{ .Values.config.memoryLimiter.checkInterval }}
        limit_percentage: {{ .Values.config.memoryLimiter.limitPercentage }}
        spike_limit_percentage: {{ .Values.config.memoryLimiter.spikeLimitPercentage }}
      # Group spans into fewer, larger requests to ilert.
      batch:
        timeout: {{ .Values.config.batch.timeout }}
        send_batch_size: {{ .Values.config.batch.sendBatchSize }}

    exporters:
      # Forward to the ilert OTLP gateway. The token is injected from the Secret
      # as an env var; ilert derives your tenant from it.
      otlphttp/ilert:
        endpoint: {{ .Values.ilert.endpoint | quote }}
        headers:
          authorization: "Bearer ${env:ILERT_OTLP_TOKEN}"

    service:
      extensions: [health_check]
      telemetry:
        metrics:
          level: basic
      pipelines:
        # Only traces go to ilert: Service Health topology is built from spans.
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/ilert]
    {{- end }}
