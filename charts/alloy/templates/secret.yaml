{{- if not .Values.ilert.existingSecret }}
{{- if not .Values.ilert.token }}
{{- fail "alloy: you must set `ilert.token` (your ilert OTLP ingest token) or point `ilert.existingSecret` at a Secret that holds it." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alloy.secretName" . }}
  labels:
    {{- include "alloy.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.ilert.token | quote }}
{{- end }}
