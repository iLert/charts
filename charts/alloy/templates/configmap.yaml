apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alloy.fullname" . }}
  labels:
    {{- include "alloy.labels" . | nindent 4 }}
data:
  config.alloy: |
    {{- if .Values.configOverride }}
    {{- .Values.configOverride | nindent 4 }}
    {{- else }}
    // Accept OTLP from OBI and any app SDK, over both gRPC and HTTP.
    otelcol.receiver.otlp "default" {
      grpc {
        endpoint = "0.0.0.0:{{ .Values.ports.otlpGrpc }}"
      }
      http {
        endpoint = "0.0.0.0:{{ .Values.ports.otlpHttp }}"
      }
      output {
        // Only wire traces: Service Health topology is built from spans.
        traces = [otelcol.processor.memory_limiter.default.input]
      }
    }

    // Refuse new data before Alloy runs out of memory under bursts.
    otelcol.processor.memory_limiter "default" {
      check_interval         = "{{ .Values.config.memoryLimiter.checkInterval }}"
      limit_percentage       = {{ .Values.config.memoryLimiter.limitPercentage }}
      spike_limit_percentage = {{ .Values.config.memoryLimiter.spikeLimitPercentage }}
      output {
        traces = [otelcol.processor.batch.default.input]
      }
    }

    // Group spans into fewer, larger requests to ilert.
    otelcol.processor.batch "default" {
      timeout         = "{{ .Values.config.batch.timeout }}"
      send_batch_size = {{ .Values.config.batch.sendBatchSize }}
      output {
        traces = [otelcol.exporter.otlphttp.ilert.input]
      }
    }

    // Forward to the ilert OTLP gateway. The token comes from the mounted Secret
    // via the ILERT_OTLP_TOKEN env var; ilert derives your tenant from it.
    otelcol.exporter.otlphttp "ilert" {
      client {
        endpoint = "{{ .Values.ilert.endpoint }}"
        headers  = {
          "Authorization" = "Bearer " + sys.env("ILERT_OTLP_TOKEN"),
        }
      }
    }
    {{- end }}
